<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HiddenGem Media | Client Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #ffffff;
    }
    .root {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.5rem;
      background: linear-gradient(135deg, #e0f2fe 0%, #f0e6ff 40%, #fce7f3 75%, #bae6fd 100%);
      position: relative;
      overflow: hidden;
    }
    .blob { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.45; pointer-events: none; }
    .b1 { width: 320px; height: 320px; background: #bae6fd; top: -80px; left: -60px; }
    .b2 { width: 280px; height: 280px; background: #f9a8d4; bottom: -60px; right: -40px; }
    .b3 { width: 200px; height: 200px; background: #c7d2fe; top: 30%; right: 5%; }
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      background: #ffffff;
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: 20px;
      padding: 2.25rem 2rem 2rem;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 4px 40px rgba(148,163,184,0.18), 0 1px 0 rgba(255,255,255,0.8) inset;
      animation: rise 0.55s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes rise { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    .logo-row { display: flex; align-items: center; justify-content: center; margin-bottom: 1.75rem; animation: rise 0.5s 0.08s both; }
    .logo-image {
      display: block;
      width: 170px;
      height: auto;
      object-fit: contain;
      flex-shrink: 0;
    }
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(148,163,184,0.2), transparent);
      margin-bottom: 1.75rem;
    }
    .title-block { margin-bottom: 1.5rem; animation: rise 0.5s 0.14s both; }
    .title-block h1 {
      font-size: 22px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin-bottom: 5px;
    }
    .title-block p { font-size: 13.5px; color: #64748b; font-weight: 400; line-height: 1.5; }
    .label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #94a3b8;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }
    .field-wrap {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.85);
      border: 1.5px solid rgba(186,230,253,0.6);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 6px;
    }
    .field-wrap:focus-within { border-color: #7dd3fc; box-shadow: 0 0 0 3px rgba(125,211,252,0.2); }
    .prefix {
      padding: 0 12px 0 14px;
      height: 48px;
      display: flex;
      align-items: center;
      font-size: 14px;
      font-weight: 600;
      color: #475569;
      letter-spacing: 0.06em;
      border-right: 1.5px solid rgba(186,230,253,0.5);
      background: rgba(240,249,255,0.7);
      flex-shrink: 0;
      gap: 4px;
    }
    .sep { color: #cbd5e1; font-weight: 300; font-size: 18px; }
    #code {
      flex: 1;
      height: 48px;
      border: none;
      outline: none;
      background: transparent;
      font-size: 22px;
      font-weight: 600;
      color: #0f172a;
      letter-spacing: 0.22em;
      padding: 0 14px;
      caret-color: #38bdf8;
      width: 0;
    }
    #code::placeholder { color: #cbd5e1; font-size: 16px; letter-spacing: 0.08em; font-weight: 400; }
    .dots { display: flex; gap: 5px; padding: 0 12px; align-items: center; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #e2e8f0; transition: background 0.15s, transform 0.15s; }
    .dot.on { background: linear-gradient(135deg, #38bdf8, #a78bfa); transform: scale(1.2); }
    .hint { font-size: 11.5px; color: #94a3b8; margin-bottom: 1.5rem; animation: rise 0.5s 0.26s both; }
    .status { font-size: 12px; min-height: 18px; margin-top: 8px; margin-bottom: 1rem; padding-left: 2px; }
    .status.e { color: #f43f5e; }
    .status.s { color: #10b981; }
    .btn {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(180deg, #3f90f6 0%, #2d6ee8 100%);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: -0.01em;
      transition: opacity 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      animation: rise 0.5s 0.3s both;
    }
    .btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    .btn.ok { background: linear-gradient(135deg, #34d399, #059669); }
    .btn.bad { background: linear-gradient(135deg, #f87171, #dc2626); animation: shake 0.4s ease; }
    .btn-icon { width: 16px; height: 16px; display: inline-block; flex: 0 0 auto; }
    .btn-icon svg { width: 100%; height: 100%; display: block; fill: currentColor; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-5px); }
      40% { transform: translateX(5px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(3px); }
    }
  </style>
</head>
<body>
  <div class="root">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="card">
      <div class="logo-row">
        <img class="logo-image" src="./assets/logo.png" alt="HiddenGem Media logo">
      </div>
      <div class="divider"></div>
      <div class="title-block">
        <h1>Client Dashboard</h1>
        <p>Enter your access code to open your dashboard.</p>
      </div>
      <div style="animation: rise 0.5s 0.2s both;">
        <label class="label" for="code">Access Code</label>
        <div class="field-wrap">
          <div class="prefix">HGM <span class="sep">-</span></div>
          <input id="code" type="text" inputmode="numeric" maxlength="5" placeholder="_ _ _ _ _" autocomplete="off" spellcheck="false" aria-label="5-digit access code">
          <div class="dots" aria-hidden="true">
            <div class="dot" id="p0"></div><div class="dot" id="p1"></div>
            <div class="dot" id="p2"></div><div class="dot" id="p3"></div>
            <div class="dot" id="p4"></div>
          </div>
        </div>
        <div class="status" id="st" role="status" aria-live="polite"></div>
      </div>
      <p class="hint">Your 5-digit code was shared by your account manager.</p>
      <button class="btn" id="btn" disabled>
        <span class="btn-icon" id="bicon" aria-hidden="true">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M17 9h-1V7a4 4 0 1 0-8 0v2H7a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2Zm-6 0V7a2 2 0 1 1 4 0v2h-4Z"></path>
          </svg>
        </span>
        <span id="btxt">Open Dashboard</span>
      </button>
    </div>
  </div>

  <script src="./login-logic.js?v=20260508f"></script>
  <script>
    const inp = document.getElementById("code");
    const btn = document.getElementById("btn");
    const st = document.getElementById("st");
    const btxt = document.getElementById("btxt");
    const bicon = document.getElementById("bicon");
    const dots = [0, 1, 2, 3, 4].map(i => document.getElementById("p" + i));
    const iconMarkup = {
      lock: '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M17 9h-1V7a4 4 0 1 0-8 0v2H7a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2Zm-6 0V7a2 2 0 1 1 4 0v2h-4Z"></path></svg>',
      loading: '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 2a1 1 0 0 1 1 1v3a1 1 0 1 1-2 0V3a1 1 0 0 1 1-1Zm0 15a1 1 0 0 1 1 1v3a1 1 0 1 1-2 0v-3a1 1 0 0 1 1-1Zm10-6a1 1 0 0 1-1 1h-3a1 1 0 1 1 0-2h3a1 1 0 0 1 1 1ZM6 12a1 1 0 0 1-1 1H2a1 1 0 1 1 0-2h3a1 1 0 0 1 1 1Zm13.07 6.66a1 1 0 0 1-1.41 0l-2.12-2.12a1 1 0 0 1 1.41-1.41l2.12 2.12a1 1 0 0 1 0 1.41ZM8.46 8.46a1 1 0 0 1-1.41 0L4.93 6.34a1 1 0 1 1 1.41-1.41l2.12 2.12a1 1 0 0 1 0 1.41Zm10.61-3.53a1 1 0 0 1 0 1.41l-2.12 2.12a1 1 0 1 1-1.41-1.41l2.12-2.12a1 1 0 0 1 1.41 0ZM8.46 15.54a1 1 0 0 1 0 1.41l-2.12 2.12a1 1 0 0 1-1.41-1.41l2.12-2.12a1 1 0 0 1 1.41 0Z"></path></svg>',
      ok: '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M9.55 18.3 4.7 13.46l1.4-1.42 3.45 3.45 8.36-8.37 1.42 1.42L9.55 18.3Z"></path></svg>',
      bad: '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="m13.41 12 4.3-4.29-1.42-1.42-4.29 4.3-4.29-4.3-1.42 1.42 4.3 4.29-4.3 4.29 1.42 1.42 4.29-4.3 4.29 4.3 1.42-1.42L13.41 12Z"></path></svg>'
    };

    function resetVisualState() {
      btn.className = "btn";
      bicon.innerHTML = iconMarkup.lock;
      btxt.textContent = "Open Dashboard";
      st.textContent = "";
      st.className = "status";
      dots.forEach((d, i) => {
        d.classList.toggle("on", i < inp.value.length);
        d.style.background = "";
      });
    }

    inp.addEventListener("input", () => {
      inp.value = window.HiddenGemLogin.normalizeAccessCode(inp.value);
      btn.disabled = inp.value.length < 5;
      resetVisualState();
    });

    inp.addEventListener("keydown", e => {
      if (e.key === "Enter" && !btn.disabled) {
        go();
      }
    });

    btn.addEventListener("click", go);

    async function go() {
      if (inp.value.length < 5) {
        return;
      }

      btn.disabled = true;
      bicon.innerHTML = iconMarkup.loading;
      btxt.textContent = "Verifying...";

      try {
        const result = await window.HiddenGemLogin.openClientDashboard(inp.value, { redirect: false });
        btn.className = "btn ok";
        bicon.innerHTML = iconMarkup.ok;
        btxt.textContent = "Access Granted";
        st.textContent = "Welcome back. Loading your dashboard...";
        st.className = "status s";
        dots.forEach(d => {
          d.classList.add("on");
          d.style.background = "#34d399";
        });
        window.location.assign(result.url);
      } catch (error) {
        btn.className = "btn bad";
        bicon.innerHTML = iconMarkup.bad;
        btxt.textContent = "Invalid Code";
        st.textContent = error.message || "That code doesn't match. Please try again.";
        st.className = "status e";
        setTimeout(() => {
          inp.value = "";
          btn.disabled = true;
          resetVisualState();
          inp.focus();
        }, 1800);
      }
    }
  </script>
</body>
</html>
